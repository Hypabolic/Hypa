name: Publish Pi Package

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: pi-package-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-pi-package:
    name: Publish @hypabolic/pi-hypa
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download release version
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: release-version
          path: release-version
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          # Pass event data through env vars rather than ${{ }} interpolation into the
          # script body, so untrusted values can't be injected into the run step.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $tag = $env:INPUT_TAG
          if ([string]::IsNullOrWhiteSpace($tag) -and (Test-Path "release-version/release-version.txt")) {
            $tag = (Get-Content "release-version/release-version.txt" -Raw).Trim()
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z. Got '$tag'." }
          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Stamp package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          jq --arg version "$VERSION" '.version = $version | .dependencies["@hypabolic/hypa"] = $version' packages/pi-hypa/package.json > "$tmp"
          mv "$tmp" packages/pi-hypa/package.json

      - name: Validate package
        working-directory: packages/pi-hypa
        run: |
          npm install --package-lock-only
          npm ci
          npm run build
          npm test
          npm pack --dry-run

      - name: Publish package
        working-directory: packages/pi-hypa
        run: npx --yes npm@^11 publish --access public
