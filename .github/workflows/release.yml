name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping CI gate"
            exit 0
          fi

          sha="${{ github.sha }}"
          runs=$(gh api "repos/${{ github.repository }}/commits/${sha}/check-runs" \
            --jq '[.check_runs[] | select(.name | test("Build & Test|AOT Publish|Format"))]')

          if [ "$(echo "$runs" | jq 'length')" -eq 0 ]; then
            echo "::error::No CI check runs found for ${sha} — run CI before tagging"
            exit 1
          fi

          not_passed=$(echo "$runs" | jq '[.[] | select(.conclusion != "success")] | length')
          if [ "$not_passed" -gt 0 ]; then
            echo "::error::CI did not fully pass on ${sha}"
            echo "$runs" | jq -r '.[] | "  \(.name): \(.conclusion)"'
            exit 1
          fi

          echo "$runs" | jq -r '.[] | "  \(.name): \(.conclusion)"'

  build:
    name: Build ${{ matrix.rid }}
    needs: [gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
            executable: hypa
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            archive: tar.gz
            executable: hypa
          - os: macos-15-intel
            rid: osx-x64
            archive: tar.gz
            executable: hypa
          - os: macos-15
            rid: osx-arm64
            archive: tar.gz
            executable: hypa
          - os: windows-latest
            rid: win-x64
            archive: zip
            executable: hypa.exe
          - os: windows-11-arm
            rid: win-arm64
            archive: zip
            executable: hypa.exe

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like vX.Y.Z. Got '$tag'."
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish src/Hypa.Cli/Hypa.Cli.csproj
          -r ${{ matrix.rid }}
          -c Release
          -o artifacts/publish/${{ matrix.rid }}
          /m:1
          /p:BuildInParallel=false
          /p:Version=${{ steps.version.outputs.version }}
          /p:FileVersion=${{ steps.version.outputs.version }}
          /p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Package
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $archive = "${{ matrix.archive }}"
          $executable = "${{ matrix.executable }}"
          $publishDir = Join-Path "artifacts/publish" $rid
          $packageRoot = Join-Path "artifacts/package" "hypa-$rid"
          $distDir = "artifacts/dist"

          New-Item -ItemType Directory -Force -Path $packageRoot, $distDir | Out-Null
          Copy-Item (Join-Path $publishDir "*") -Destination $packageRoot -Recurse
          if ($archive -eq "tar.gz") {
            chmod +x (Join-Path $packageRoot $executable)
            tar -czf (Join-Path $distDir "hypa-$rid.tar.gz") -C "artifacts/package" "hypa-$rid"
          } else {
            Compress-Archive -Path $packageRoot -DestinationPath (Join-Path $distDir "hypa-$rid.zip") -Force
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: hypa-${{ matrix.rid }}
          path: artifacts/dist/*
          if-no-files-found: error

  checksums:
    name: Generate checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum hypa-* > SHA256SUMS

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error

  publish-sdk:
    name: Pack & Publish Hypa.Sdk
    runs-on: ubuntu-latest
    needs: [gate]

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like vX.Y.Z. Got '$tag'."
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >
          dotnet build src/Hypa.Sdk/Hypa.Sdk.csproj
          -c Release
          /p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >
          dotnet pack src/Hypa.Sdk/Hypa.Sdk.csproj
          -c Release
          --no-build
          -o artifacts/sdk
          /p:Version=${{ steps.version.outputs.version }}

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet nuget push artifacts/sdk/*.nupkg
          --source "https://nuget.pkg.github.com/Hypabolic/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: checksums
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = $env:GITHUB_REF_NAME }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z. Got '$tag'." }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish platform packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for RID in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64 win-arm64; do
            case "$RID" in
              linux-x64)   NPM=linux-x64;    OS=linux;  CPU=x64;   EXT=tar.gz; BIN=hypa     ;;
              linux-arm64) NPM=linux-arm64;  OS=linux;  CPU=arm64; EXT=tar.gz; BIN=hypa     ;;
              osx-x64)     NPM=darwin-x64;   OS=darwin; CPU=x64;   EXT=tar.gz; BIN=hypa     ;;
              osx-arm64)   NPM=darwin-arm64; OS=darwin; CPU=arm64; EXT=tar.gz; BIN=hypa     ;;
              win-x64)     NPM=win32-x64;    OS=win32;  CPU=x64;   EXT=zip;    BIN=hypa.exe ;;
              win-arm64)   NPM=win32-arm64;  OS=win32;  CPU=arm64; EXT=zip;    BIN=hypa.exe ;;
            esac

            STAGE="staging/hypa-${NPM}"
            mkdir -p "${STAGE}/bin"

            if [[ "$EXT" == "tar.gz" ]]; then
              tar -xzf "dist-artifacts/hypa-${RID}.tar.gz" -C "${STAGE}/bin" --strip-components=1
            else
              unzip -j "dist-artifacts/hypa-${RID}.zip" "hypa-${RID}/*" -d "${STAGE}/bin"
            fi

            jq \
              --arg name "@hypabolic/hypa-${NPM}" \
              --arg version "${VERSION}" \
              --arg os "${OS}" \
              --arg cpu "${CPU}" \
              --arg desc "Hypa native binary for ${OS} ${CPU}" \
              '.name=$name | .version=$version | .description=$desc | .os=[$os] | .cpu=[$cpu]' \
              npm/hypa-platform/package.json > "${STAGE}/package.json"

            cp npm/hypa-platform/postinstall.js "${STAGE}/postinstall.js"

            npx --yes npm@^11 publish "./${STAGE}" --access public
          done

      - name: Publish main wrapper package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="staging/hypa-main"
          mkdir -p "${STAGE}"

          jq \
            --arg version "${VERSION}" \
            'def stamp: if type == "string" and . == "0.0.0" then $version else . end;
             .version = $version |
             .optionalDependencies = (.optionalDependencies | with_entries(.value |= stamp))' \
            npm/hypa/package.json > "${STAGE}/package.json"

          cp npm/hypa/bin.js "${STAGE}/bin.js"

          npx --yes npm@^11 publish "./${STAGE}" --access public

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [checksums, publish-sdk, publish-npm]

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF_NAME
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like vX.Y.Z. Got '$tag'."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --notes "Release $TAG" --verify-tag
          fi

  publish-homebrew:
    name: Publish Homebrew tap
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = $env:GITHUB_REF_NAME }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z. Got '$tag'." }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Extract SHA256s
        id: sha
        run: |
          extract() { grep " $1" dist/SHA256SUMS | awk '{print $1}'; }
          echo "linux_x64=$(extract hypa-linux-x64.tar.gz)"    >> $GITHUB_OUTPUT
          echo "linux_arm64=$(extract hypa-linux-arm64.tar.gz)" >> $GITHUB_OUTPUT
          echo "osx_x64=$(extract hypa-osx-x64.tar.gz)"        >> $GITHUB_OUTPUT
          echo "osx_arm64=$(extract hypa-osx-arm64.tar.gz)"    >> $GITHUB_OUTPUT

      - name: Generate formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          SHA_OSX_X64: ${{ steps.sha.outputs.osx_x64 }}
          SHA_OSX_ARM64: ${{ steps.sha.outputs.osx_arm64 }}
        run: |
          sed \
            -e "s|PLACEHOLDER_VERSION|${VERSION}|g" \
            -e "s|PLACEHOLDER_SHA_OSX_X64|${SHA_OSX_X64}|g" \
            -e "s|PLACEHOLDER_SHA_OSX_ARM64|${SHA_OSX_ARM64}|g" \
            -e "s|PLACEHOLDER_SHA_LINUX_X64|${SHA_LINUX_X64}|g" \
            -e "s|PLACEHOLDER_SHA_LINUX_ARM64|${SHA_LINUX_ARM64}|g" \
            homebrew/hypa.rb.tpl > formula-staging.rb

      - name: Push to tap repo
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/Hypabolic/homebrew-tap.git" \
            tap-repo
          cp formula-staging.rb tap-repo/Formula/hypa.rb
          cd tap-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/hypa.rb
          git diff --cached --quiet || \
            (git commit -m "hypa ${VERSION}" && git push)

  publish-pypi:
    name: Publish PyPI wheels
    runs-on: ubuntu-latest
    needs: checksums
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = $env:GITHUB_REF_NAME }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z. Got '$tag'." }
          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build wheel
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - name: Build platform wheels
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p wheelhouse
          for RID in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            python python/scripts/build_wheel.py \
              --rid "$RID" \
              --version "$VERSION" \
              --artifact-dir dist-artifacts \
              --output-dir wheelhouse
          done
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
